variables:
  JAVA_HOME: "/usr/lib/jvm/java-17-openjdk"

stages:
  - checkout
  - build   # dummy stage to follow the template guidelines
  - test

checkout:
  stage: checkout
  script:
    - git clone https://gitlab.com/manoj-jeenu/spring-boot-microservices.git

build:
  stage: build
  script:
    - echo !!! Build ran successful  # just printing a log

test:
  stage: test
  script:
    - echo run tests    # Run unit tests


