spring:
  application:
    name: inventory-service
  datasource:
    url:  jdbc:mysql://localhost:3306/inventory-service
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka

server:
  port: 8083 # assigns a random port based on the port availability

logging:
  level:
    root: INFO

management: #Distributed Tracing
  tracing:
    sampling:
      probability: 1.0
  endpoints: # Spring Boot Actuator (for health check and metrics endpoints)
    web:
      exposure:
        include: "*"